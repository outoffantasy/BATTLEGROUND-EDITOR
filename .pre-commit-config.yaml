repos:
  # 从 pre-commit/pre-commit-hooks 这个公开仓库下载一组现成 hook。
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: local
    hooks:
      - id: py-compile-backend-scripts
        name: Check Python syntax for backend scripts
        entry: uv --directory backend run python -m py_compile scripts/download_card_assets.py scripts/process_hearthstonejson.py scripts/sync_raw_hearthstonejson.py
        language: system
        pass_filenames: false
