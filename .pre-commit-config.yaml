# 本地 commit 前检查用的配置文件
repos:
  # 从 pre-commit/pre-commit-hooks 这个公开仓库下载一组现成 hook。
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
