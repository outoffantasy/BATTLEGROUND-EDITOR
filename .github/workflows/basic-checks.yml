name: Basic Checks

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Debian 13 Docker image
        run: docker build -t battleground-editor:ci .

      - name: Check Debian container environment
        run: |
          docker run --rm battleground-editor:ci bash -lc '
            cat /etc/os-release
            python --version
            python -m playwright --version
            node --version
          '
