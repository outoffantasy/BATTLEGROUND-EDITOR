name: Basic Checks

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Python syntax
        run: python -m py_compile backend/scripts/*.py

      - name: Check processed JSON
        run: |
          for file in backend/data/processed/*.json; do
            python -m json.tool "$file" > /dev/null
          done
